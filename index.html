<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chibuike Clothing Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
  <h1>Chibuike Store</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#products">Shop</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO SECTION -->
<section class="hero">
  <h2>Upgrade Your Style</h2>
  <p>Modern fashion for everyone</p>
  <button onclick="scrollToProducts()">Shop Now</button>
</section>

<!-- PRODUCTS -->
<section id="products" class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" alt="T-shirt">
    <h3>Classic T-Shirt</h3>
    <p>$20</p>
    <button onclick="buyItem('Classic T-Shirt')">Buy</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246" alt="Hoodie">
    <h3>Black Hoodie</h3>
    <p>$40</p>
    <button onclick="buyItem('Black Hoodie')">Buy</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f" alt="Jacket">
    <h3>Denim Jacket</h3>
    <p>$60</p>
    <button onclick="buyItem('Denim Jacket')">Buy</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b" alt="Sneakers">
    <h3>White Sneakers</h3>
    <p>$50</p>
    <button onclick="buyItem('White Sneakers')">Buy</button>
  </div>

</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Contact Us</h2>
  <p>WhatsApp: 09168144059</p>
</section>

<script src="script.js"></script>
</body>
</html>
